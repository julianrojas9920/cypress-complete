name: Cypress UI Tests

on:
  push:
    branches: [ master ]
    paths:
      - 'cypress/e2e/ui/**'
      - 'cypress/pages/**'
      - 'cypress/selectors/**'
  pull_request:
    branches: [ master ]
    paths:
      - 'cypress/e2e/ui/**'
      - 'cypress/pages/**'
      - 'cypress/selectors/**'

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  cypress-ui:
    name: UI Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Instalar dependencias
        run: npm ci

      - name: Correr tests UI
        run: npm run cy:ui
            
      - name: Setup Pages
        if: always()
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        if: always()
        uses: actions/upload-pages-artifact@v3.0.1
        with:
          path: cypress/reports/

  deploy:
    name: Publicar Reporte UI
    needs: cypress-ui
    runs-on: ubuntu-latest
    if: always()

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4.0.5